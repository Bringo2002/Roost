# Production database (Railway variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${POSTGRES_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:roost}}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:${PGUSER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:${PGPASSWORD:postgres}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (Railway sets PORT env var)
server.port=${PORT:8080}

# Disable seed data in production
spring.sql.init.mode=never

# JWT secret from env var
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

