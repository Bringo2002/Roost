spring.application.name=roost

# Database configuration
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:roost}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP: Never crash startup if DB is initializing or delayed
spring.datasource.hikari.initialization-fail-timeout=-1

# Server port
server.port=${PORT:8080}

# Allow larger request bodies for base64-encoded encrypted chat
# attachments (client caps raw files at 5MB, ~6.7MB after base64).
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# Seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Cloudflare R2 (S3-compatible) storage for encrypted chat attachments.
# Set these in Railway once you've created an R2 bucket + API token --
# until then, attachment upload/download returns a clear 503 instead of
# breaking the rest of the app.
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET:}
